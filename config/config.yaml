pure_pursuit:
  ros__parameters:
    odom_topic: "/odom"
    path_topic: "/Path"
    car_refFrame: "base_link"
    global_refFrame: "map"
    drive_topic: "/drive"
    test_mode: False
    drive_test_topic: "/drive_test"
    rviz_current_waypoint_topic: "/current_waypoint"
    rviz_lookahead_waypoint_topic: "/lookahead_waypoint"
    rviz_speed_offset_waypoint_topic: "/speed_offset_waypoint"
    rviz_runtime_params_topic: "/pp_runtime_params"
    rviz_runtime_params_x: 0.0
    rviz_runtime_params_y: 0.0
    rviz_runtime_params_z: 1.2

    # /rf(std_msgs/UInt16MultiArray) 기반 실시간 속도 파라미터 조절
    # channel 값은 /rf.data[]의 0-based index입니다. 예: CH7 -> 6, CH8 -> 7
    rf_topic: "/rf"
    rf_speed_scale_channel: 6
    rf_max_limit_channel: 7
    rf_enable_channel: 8
    rf_enable_threshold: 750
    rf_value_min: 1000
    rf_value_max: 2000

    path_is_circular: True
    # path_is_circular를 false로 해야 로컬패스 가능
    
    # Pure Pursuit Parameters
    # Lookahead is computed using the following: lookahead = min(max(min_lookahead, max_lookahead * curr_velocity / lookahead_ratio), max_lookahead);
    # min_lookahead: 0.5 # for square track
    min_lookahead: 0.5 # for larger track
    max_lookahead: 2.5 # lookahead when the car is going around max velocity
    lookahead_ratio: 7.5 # approximately the max velociy
    
    # 속도 프로파일을 읽는 waypoint의 거리 offset(m).
    # 양수: 앞쪽 path speed(z)를 미리 읽음, 음수: 뒤쪽 speed(z)를 읽음, 0: 현재 closest 기준
    speed_profile_distance_offset: 0.5

    #보간된 drive command를 출력 hz
    drive_output_rate_hz: 50.0

    #steer잔떨림 제거 필터
    steer_latest_blend: 0.01   #적은 스티어링 변화에서 1주기당 새로운 값 반영 비율, 높을수록 빠른 반영 낮을수록 잔떨림 적어짐
    steer_large_change_blend: 0.15  #높은 스티어링 변화에서 1주기당 새로운 값 반영 비율, 높을수록 빠른 반영 낮을수록 잔떨림 적어짐
    steer_blend_change_threshold_deg: 20.0  #낮은 스티어링/높은 스티어링 변화량 threash hold, 실제 반영은 이 값을 기준으로 부드럽게 blend비율을 반영함.
    # 고속에서는 위 조향 필터 alpha를 최종값까지 서서히 올려 필터링을 줄임
    steer_speed_filter_start_speed: 3.0  # m/s, 이 속도부터 고속 필터 완화 시작
    steer_speed_filter_end_speed: 4.0  # m/s, 이 속도 이상에서는 아래 최종 blend 적용
    steer_speed_filter_final_blend: 0.70  # 고속 최종 조향 blend, 높을수록 응답 빠름

    #speed 잔떨림 제거 필더
    speed_latest_blend: 0.40

    
    #K_p: 0.25 # for square track
    #K_p: 0.15 # for big track
    
    #PID, Heding error계수
    min_searching_idx_offset: 10
    max_searching_idx_offset: 40
    K_p: 0.51
    K_d: 0.035
    K_i: 0.000

    heading_error_gain: 0.45
    steering_limit: 50.0

    # 서보-링크 비선형 보정용 steering expo
    # gain > 0: 극단부 조향을 더 밀어줌, gain < 0: 극단부 조향을 눌러줌
    # curve가 클수록 중앙부 영향은 줄고 끝단부 영향이 커짐
    steering_expo_gain: 0.35
    steering_expo_curve: 2.0
    
    # 기본 속도 배수. 런타임에는 ros2 param set으로 즉시 변경 가능
    velocity_percentage: 0.850
    # 지금까지 수신한 path speed(z)의 최대값에 곱하는 최종 속도 제한 비율
    max_speed_limit_percentage: 1.0

    #장애물 관련 속도 감속 파라미터
    slow_with_obs: True
    obs_slow_th: 2.0 #(m)
    obs_slow_percentage: 0.7 #(퍼센트)


    #고속 안정성용 파라미터(인공홀 기준)
    steer_reduction_speed_threshold: 4.0 # 조향감소 시작 속도m/s
    steer_reduction_constant_coef: 0.90  #조향감소 상수계수(스케일)
    steer_reduction_linear_coef: 0.05  #조향감소 선형계수(스케일)
    steer_reduction_min_scale: 0.5  #조향감소 하한치(스케일)
    speed_reduction_steer_angle_deg: 5.0  #속도 감소가 시작되는 감소량(deg)
    max_allowed_steer_drop_deg: 15.0  #최대 조향 감소량(최소 보장되는 스티어링 앵글(deg))
    speed_reduction_adjust: 0.3  #속도 제한 시 추가로 감속할 양(+이면 더 감속, -이면 완화)
    speed_reduction_prev_scale: 0.2  #이전 감속량 기반 추가 스케일 계수

waypoint_visualizer_node:
  ros__parameters:
    path_topic: "/Path"
    rviz_waypoints_topic: "/waypoints"
