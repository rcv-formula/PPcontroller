pure_pursuit:
  ros__parameters:
    odom_topic: "/odom"
    path_topic: "/Path"
    car_refFrame: "base_link"
    global_refFrame: "map"
    drive_topic: "/drive"
    rviz_current_waypoint_topic: "/current_waypoint"
    rviz_lookahead_waypoint_topic: "/lookahead_waypoint"
    path_is_circular: True
    # path_is_circular를 false로 해야 로컬패스 가능
    
    # Pure Pursuit Parameters
    # Lookahead is computed using the following: lookahead = min(max(min_lookahead, max_lookahead * curr_velocity / lookahead_ratio), max_lookahead);
    # min_lookahead: 0.5 # for square track
    min_lookahead: 1.2 # for larger track
    max_lookahead: 2.5 # lookahead when the car is going around max velocity
    lookahead_ratio: 10.5 # approximately the max velociy
    
    # 속도 프로파일 lookahead. 현재 종방향 속도/가속도가 유지된다고 가정하고
    # 이 시간 뒤 도달할 path index의 speed(z)를 사용한다.
    # 양수: 감가속 타이밍을 앞당김, 음수: 감가속 타이밍을 늦춤, 0: 현재 위치 기준
    speed_lookahead_time: 0.0
    speed_lookahead_accel_limit: 8.0
    speed_lookahead_accel_weight: 1.0
    #K_p: 0.25 # for square track
    #K_p: 0.15 # for big track
    
    #PID, Heding error계수
    min_searching_idx_offset: 10
    max_searching_idx_offset: 40
    K_p: 0.51
    K_d: 0.06
    K_i: 0.000

    heading_error_gain: 0.45
    steering_limit: 50.0

    # 서보-링크 비선형 보정용 steering expo
    # gain > 0: 극단부 조향을 더 밀어줌, gain < 0: 극단부 조향을 눌러줌
    # curve가 클수록 중앙부 영향은 줄고 끝단부 영향이 커짐
    steering_expo_gain: 0.35
    steering_expo_curve: 2.0
    
    velocity_percentage: 0.850 # the limit, can only do 1 lap with clean tires

    #장애물 관련 속도 감속 파라미터
    slow_with_obs: True
    obs_slow_th: 2.0 #(m)
    obs_slow_percentage: 0.7 #(퍼센트)


    #고속 안정성용 파라미터(인공홀 기준)
    steer_reduction_speed_threshold: 4.0 # 조향감소 시작 속도m/s
    steer_reduction_constant_coef: 0.90  #조향감소 상수계수(스케일)
    steer_reduction_linear_coef: 0.05  #조향감소 선형계수(스케일)
    steer_reduction_min_scale: 0.5  #조향감소 하한치(스케일)
    speed_reduction_steer_angle_deg: 5.0  #속도 감소가 시작되는 감소량(deg)
    max_allowed_steer_drop_deg: 15.0  #최대 조향 감소량(최소 보장되는 스티어링 앵글(deg))
    speed_reduction_adjust: 0.3  #속도 제한 시 추가로 감속할 양(+이면 더 감속, -이면 완화)
    speed_reduction_prev_scale: 0.2  #이전 감속량 기반 추가 스케일 계수

waypoint_visualizer_node:
  ros__parameters:
    path_topic: "/Path"
    rviz_waypoints_topic: "/waypoints"
